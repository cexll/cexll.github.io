<h1 id="golang编译命令">golang编译命令</h1>

<pre><code class="language-bash">GOOS=linux GOARCH=amd64 go build -ldflags &quot;-w -s&quot; -o name
</code></pre>

<ul>
<li>GOOS: 要运行的操作系统</li>
<li>GOARCH: 要运行的系统位数(amd64/386)</li>
<li>name: 编译后软件名称</li>
</ul>
